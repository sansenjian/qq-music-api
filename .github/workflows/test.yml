name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # 启用 npm 缓存

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run eslint
        continue-on-error: true # ESLint 错误不阻止测试

      - name: Run tests with coverage
        run: npm run test:coverage # 生成覆盖率报告

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # 添加 token 提高稳定性

  build:
    runs-on: ubuntu-latest
    needs: test # 依赖测试通过

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 使用 LTS 版本
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build # 编译 TypeScript

      - name: Build documentation
        run: npm run docs:build # 构建文档

      - name: Verify build
        run: |
          # 验证 dist 目录
          if [ ! -d "dist" ]; then
            echo "❌ TypeScript build failed: dist directory not found"
            exit 1
          fi

          # 验证入口文件
          if [ ! -f "dist/app.js" ]; then
            echo "❌ TypeScript build failed: dist/app.js not found"
            exit 1
          fi

          # 验证文档目录
          if [ ! -d "docs-dist" ]; then
            echo "❌ Documentation build failed: docs-dist directory not found"
            exit 1
          fi

          echo "✅ Build successful: dist/ and docs-dist/ verified"
