name: Publish to NPM and GitHub Packages

on:
  release:
    types: [published]

jobs:
  # 发布到 npm
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - run: npm install
      
      # 使用 npm publish --access public 确保作用域包公开发布
      # --provenance 生成发布证明
      - run: |
          echo "Publishing to npm..."
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 发布到 GitHub Packages
  publish-github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      
      - run: npm install
      
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
